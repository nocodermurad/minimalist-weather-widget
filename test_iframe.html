<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Widget - Iframe Test Suite</title>
  <style>
    body {
      margin: 0;
      padding: 40px;
      background-color: #F8F9FA;
      color: #333;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      gap: 40px;
      align-items: center;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: #121212;
        color: #e0e0e0;
      }
    }

    h1 {
      margin-bottom: 8px;
    }

    .test-case {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 900px;
    }

    .test-case-title {
      font-size: 16px;
      font-weight: 600;
      opacity: 0.8;
    }

    iframe {
      border: none;
      background: white;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      border-radius: 14px; /* Matches widget's custom boundary nicely */
      transition: all 0.3s ease;
    }

    @media (prefers-color-scheme: dark) {
      iframe {
        background: #191919;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      }
    }
  </style>
</head>
<body>

  <h1>Weather Widget Iframe Test Suite</h1>
  <p>This page embeds the weather widget in three different iframe sizes to test responsive container queries and embed borders.</p>

  <!-- 1. Wide Layout Test -->
  <div class="test-case">
    <div class="test-case-title">1. Wide Landscape Embed (800px x 250px)</div>
    <iframe src="index.html" width="800" height="250"></iframe>
  </div>

  <!-- 2. Medium Layout Test -->
  <div class="test-case">
    <div class="test-case-title">2. Medium Square Embed (600px x 400px)</div>
    <iframe src="index.html" width="600" height="400"></iframe>
  </div>

  <!-- 3. Narrow Layout Test -->
  <div class="test-case">
    <div class="test-case-title">3. Narrow Portrait Embed (320px x 550px)</div>
    <iframe src="index.html" width="320" height="550"></iframe>
  </div>

</body>
</html>
